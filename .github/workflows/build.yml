name: Build & Test Pipeline

on:
  push:
    branches: [ main, master, dev, ci-test ]
  pull_request:
    branches: [ main, master, dev, ci-test ]

env:
  CI_COMMIT_REF_SLUG: ${{ github.ref_name }}
  GRADLE_USER_HOME: ~/.gradle

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.CI_COMMIT_REF_SLUG }}-gradle-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ env.CI_COMMIT_REF_SLUG }}-gradle-

      - name: Build with Gradle
        run: gradle clean build -x test

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: build/
          key: ${{ env.CI_COMMIT_REF_SLUG }}-build-${{ github.run_id }}
          restore-keys: |
            ${{ env.CI_COMMIT_REF_SLUG }}-build-

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build/
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    name: Test
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ env.CI_COMMIT_REF_SLUG }}-gradle-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ env.CI_COMMIT_REF_SLUG }}-gradle-

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: build/

      - name: Run tests
        run: gradle test