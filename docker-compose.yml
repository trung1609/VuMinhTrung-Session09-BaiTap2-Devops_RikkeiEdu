# ============================================================
# docker-compose.yml
# Dùng để chạy toàn bộ stack ứng dụng ở môi trường LOCAL DEV
# ============================================================

version: '3.9'

services:
  # -----------------------------------------------
  # Service 1: User Service (Spring Boot App)
  # -----------------------------------------------
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-service-app
    ports:
      - "8080:8080"   # Map cổng 8080 của host vào container
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - JAVA_OPTS=-XX:+UseG1GC -XX:MaxRAMPercentage=75.0
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - backend-network

# -----------------------------------------------
# Networks: Mạng nội bộ riêng cho các services
# -----------------------------------------------
networks:
  backend-network:
    driver: bridge
